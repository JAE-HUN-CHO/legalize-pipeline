name: Daily Precedents Update

on:
  schedule:
    - cron: '0 6 * * *' # 15:00 KST (UTC+9)
  workflow_dispatch:
    inputs:
      days:
        description: 'Lookback days'
        required: false
        default: '180'

permissions:
  contents: write

concurrency:
  group: precedents-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      - name: Checkout precedent repo
        uses: actions/checkout@v4
        with:
          repository: legalize-kr/precedent-kr
          token: ${{ secrets.REPO_PAT }}
          fetch-depth: 0
          path: workspace

      - name: Clean previous pipeline checkout
        run: rm -rf workspace/pipeline

      - name: Checkout pipeline
        uses: actions/checkout@v4
        with:
          path: workspace/pipeline

      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          repository: legalize-kr/legalize-web
          token: ${{ secrets.REPO_PAT }}
          path: docs-repo

      - name: Setup Python venv
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install -r workspace/pipeline/requirements.txt

      - name: Configure git
        working-directory: workspace
        run: |
          git config user.name "legalize-kr-bot"
          git config user.email "bot@legalize.kr"

      - name: Run precedent update
        working-directory: workspace/pipeline
        env:
          LAW_OC: ${{ secrets.LAW_OC }}
          WORKSPACE_ROOT: ${{ github.workspace }}/workspace
        run: |
          . ../../.venv/bin/activate
          python -m precedents.update --days ${{ inputs.days || '180' }}

      - name: Regenerate metadata
        working-directory: workspace/pipeline
        env:
          WORKSPACE_ROOT: ${{ github.workspace }}/workspace
        run: |
          . ../../.venv/bin/activate
          python -m precedents.generate_metadata

      - name: Stop tracking metadata.json and stats.json (one-time cleanup)
        working-directory: workspace
        run: |
          for f in metadata.json stats.json; do
            git ls-files --error-unmatch "$f" >/dev/null 2>&1 && git rm --cached -f "$f" || true
            grep -qxF "$f" .gitignore 2>/dev/null || echo "$f" >> .gitignore
          done
          git add .gitignore
          if git diff --cached --quiet; then
            echo "metadata.json/stats.json already untracked"
          else
            git commit --author="legalize-kr-bot <bot@legalize.kr>" \
              -m "chore: stop tracking metadata.json and stats.json"
          fi

      - name: Push changes
        working-directory: workspace
        run: |
          if [ -n "$(git log origin/main..HEAD --oneline)" ]; then
            git push
          else
            echo "No new commits to push"
          fi

      - name: Update docs precedent stats
        run: |
          if [ -f workspace/stats.json ]; then
            cd docs-repo
            git fetch origin main
            git reset --hard origin/main
            # rename: precedent-kr/stats.json and laws stats.json collide in docs-repo root
            cp ../workspace/stats.json precedent-stats.json
            git add precedent-stats.json
            git diff --staged --quiet && echo "No docs changes" && exit 0
            git config user.name "legalize-kr-bot"
            git config user.email "bot@legalize.kr"
            git commit --author="legalize-kr-bot <bot@legalize.kr>" -m "chore: update precedent-stats.json"
            git push origin main
          fi
